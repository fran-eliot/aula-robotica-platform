{% extends "base.html" %}

{% block content %}

<div class="card">

    <div class="card-header d-flex justify-content-between">
        <h3 class="card-title">
            <i class="fas fa-id-badge"></i> Identidades
        </h3>

        <a href="/identities/form" class="btn btn-primary btn-sm">
            <i class="fas fa-plus"></i> Nueva
        </a>
    </div>

    <div class="card-body p-0">

        {% if identities %}

        <table class="table table-hover">

            <thead>
                <tr>
                    <th>Email</th>
                    <th>Usuario</th>
                    <th>Rol</th>
                    <th></th>
                </tr>
            </thead>

            <tbody>
                {% for i in identities %}
                <tr>

                    <td>{{ i.email }}</td>
                    <td>{{ i.usuario.nombre if i.usuario else "-" }}</td>
                    <td>{{ i.rol.nombre if i.rol else "-" }}</td>

                    <td class="text-right">

                        <a href="/identities/{{ i.id }}/edit"
                           class="btn btn-warning btn-sm">
                            <i class="fas fa-edit"></i>
                        </a>

                        <form method="post"
                              action="/identities/{{ i.id }}/delete"
                              style="display:inline;">
                            <button class="btn btn-danger btn-sm">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>

                    </td>

                </tr>
                {% endfor %}
            </tbody>

        </table>

        {% else %}
        <div class="p-4 text-center text-muted">
            No hay identidades
        </div>
        {% endif %}

    </div>

</div>

{% endblock %}
