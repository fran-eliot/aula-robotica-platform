{% extends "base.html" %}

{% block title %}
Crear identidad
{% endblock %}

{% block page_title %}
Crear identidad
{% endblock %}

{% block content %}

<div class="card">

    <div class="card-header">
        <h3 class="card-title">Nueva identidad</h3>
    </div>

    <form method="post">

        <div class="card-body">

            <!-- Email -->

            <div class="form-group">
                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required
                >
            </div>


            <!-- Password -->

            <div class="form-group">
                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required
                >
            </div>


            <!-- Usuario -->

            <div class="form-group">
                <label>Usuario</label>

                <select name="user_id" class="form-control" required>

                    <option disabled selected>Selecciona usuario</option>

                    {% for user in users %}

                    <option value="{{ user.id_usuario }}">
                        {{ user.nombre }}
                    </option>

                    {% endfor %}

                </select>
            </div>


            <!-- Rol -->

            <div class="form-group">
                <label>Rol</label>

                <select name="rol_id" class="form-control">

                    <option value="">
                        Rol por defecto (estudiante)
                    </option>

                    {% for role in roles %}

                    <option value="{{ role.id_rol }}">
                        {{ role.nombre }}
                    </option>

                    {% endfor %}

                </select>

            </div>

        </div>


        <div class="card-footer">

            <button type="submit" class="btn btn-primary">
                Crear identidad
            </button>

            <a href="/identities/" class="btn btn-secondary">
                Cancelar
            </a>

        </div>

    </form>

</div>

{% endblock %}
