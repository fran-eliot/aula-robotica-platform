{% extends "base.html" %}

{% block title %}
Editar identidad
{% endblock %}

{% block page_title %}
Editar identidad
{% endblock %}

{% block content %}

<div class="card">

<div class="card-header">
<h3 class="card-title">Editar identidad</h3>
</div>

<div class="card-body">

<form method="post">

<div class="form-group">
<label>Email</label>
<input name="email"
       class="form-control"
       value="{{ identity.email }}">
</div>

<div class="form-group">
<label>Nueva contraseña (opcional)</label>
<input type="password"
       name="password"
       class="form-control">
</div>

<div class="form-group">
<label>Usuario</label>

<select name="user_id" class="form-control">

{% for user in users %}

<option value="{{ user.id_usuario }}"
{% if user.id_usuario == identity.user_id %}
selected
{% endif %}
>
{{ user.nombre }}
</option>

{% endfor %}

</select>

</div>

<div class="form-group">
<label>Rol</label>

<select name="rol_id" class="form-control">

{% for role in roles %}

<option value="{{ role.id_rol }}"
{% if role.id_rol == identity.rol_id %}
selected
{% endif %}
>
{{ role.nombre }}
</option>

{% endfor %}

</select>

</div>

<button class="btn btn-primary">
Guardar cambios
</button>

</form>

</div>

</div>

{% endblock %}
