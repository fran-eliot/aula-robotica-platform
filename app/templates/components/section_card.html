{% macro section_card(title=None, icon=None, footer=False) %}

<div class="card shadow-sm">

    {% if title %}
    <div class="card-header">
        <h3 class="card-title">
            {% if icon %}
                <i class="fas fa-{{ icon }}"></i>
            {% endif %}
            {{ title }}
        </h3>
    </div>
    {% endif %}

    <div class="card-body">
        {{ caller() }}
    </div>

    {% if footer %}
    <div class="card-footer">
        {{ footer }}
    </div>
    {% endif %}

</div>

{% endmacro %}
