{% macro metric_card(title, value, icon, color, url=None, tooltip=None) %}

<div class="col-xl-3 col-md-6 col-sm-6 mb-4">

    <div class="card metric-card border-0 shadow-sm h-100"
         {% if url %}onclick="window.location='{{ url }}'"{% endif %}
         {% if tooltip %}title="{{ tooltip }}"{% endif %}
          {% if url %}metric-clickable{% endif %}>

        <div class="card-body d-flex justify-content-between align-items-center">

            <!-- TEXTO -->
            <div class="pr-2">

                <div class="metric-title text-muted text-uppercase">
                    {{ title }}
                </div>

                <div class="metric-value">
                    {{ value }}
                </div>

            </div>

            <!-- ICONO -->
            <div class="metric-icon bg-{{ color }}">
                <i class="{{ icon }}"></i>
            </div>

        </div>

        {% if url %}
        <div class="card-footer bg-white border-0 pt-0 pb-3 px-4">
            <small class="metric-link">
                Ver detalle
                <i class="fas fa-arrow-right ml-1"></i>
            </small>
        </div>
        {% endif %}

    </div>

</div>

{% endmacro %}
