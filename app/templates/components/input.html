{% macro input(name, label, value="", errors=None, type="text", required=False) %}
<div class="form-group">
    <label>{{ label }}</label>

    <input
        type="{{ type }}"
        name="{{ name }}"
        value="{{ value }}"
        class="form-control {% if errors %}is-invalid{% endif %}"
        {% if required %}required{% endif %}
    >

    {% if errors %}
    <div class="invalid-feedback">
        {{ errors[0] }}
    </div>
    {% endif %}
</div>
{% endmacro %}
