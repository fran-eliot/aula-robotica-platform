{% from "components/user_actions.html" import user_actions with context %}
{% from "components/badges.html" import status %}

{% macro user_row(user) %}

<tr class="user-row"
    onclick="window.location='/users/{{ user.id_usuario }}'">

    <!-- ID -->
    <td class="align-middle text-muted text-center user-id">
        #{{ user.id_usuario }}
    </td>

    <!-- USUARIO -->
    <td class="align-middle">

        <div class="d-flex align-items-center">

            <div class="user-avatar mr-3">
                <i class="fas fa-user"></i>
            </div>

            <div>
                <div class="user-name">
                    {{ user.nombre }}
                </div>

                <small class="text-muted">
                    Usuario del sistema
                </small>
            </div>

        </div>

    </td>

    <!-- ESTADO -->
    <td class="align-middle text-center">
        {{ status(user.activo) }}
    </td>

    <!-- ACCIONES -->
    <td class="align-middle text-center text-nowrap"
        onclick="event.stopPropagation();">

        {{ user_actions(user) }}

    </td>

</tr>

{% endmacro %}
