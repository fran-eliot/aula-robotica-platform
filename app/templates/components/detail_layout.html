{% macro detail_layout(title, icon=None) %}

<div class="row">

    <!-- COLUMNA IZQUIERDA -->
    <div class="col-md-4">
        <div class="card card-primary card-outline shadow-sm">
            <div class="card-header">
                <h3 class="card-title">
                    {% if icon %}
                        <i class="fas fa-{{ icon }}"></i>
                    {% endif %}
                    {{ title }}
                </h3>
            </div>

            <div class="card-body">
                {{ caller('left') }}
            </div>
        </div>
    </div>

    <!-- COLUMNA DERECHA -->
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">
                {{ caller('right') }}
            </div>
        </div>
    </div>

</div>

{% endmacro %}
