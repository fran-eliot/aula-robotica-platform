<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Login | Aula Robótica</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- AdminLTE -->
    <link rel="stylesheet" href="/static/adminlte/css/adminlte.min.css">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="/static/adminlte/plugins/fontawesome-free/css/all.min.css">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/icons/android-chrome-512x512.png">
    <link rel="manifest" href="/static/icons/site.webmanifest">
    
    <style>
        .login-logo b {
            font-weight: 600;
        }

        .login-card-body {
            border-radius: 10px;
        }

        .input-group-text {
            background-color: #f4f6f9;
        }

        .btn-primary {
            border-radius: 6px;
        }

        .login-footer {
            font-size: 0.85rem;
            color: #6c757d;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body class="hold-transition login-page">

<div class="login-box">

    <!-- LOGO -->
    <div class="login-logo">
        <b>Aula Robótica</b>
    </div>

    <div class="card shadow-sm">

        <div class="card-body login-card-body">

            <!-- TITULO -->
            <p class="login-box-msg">
                Accede a tu cuenta
            </p>

            <!-- ERROR -->
            {% if error %}
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-circle"></i>
                {{ error }}
            </div>
            {% endif %}

            <!-- FORM -->
            <form action="/login" method="post">

                <!-- EMAIL -->
                <div class="input-group mb-3">
                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="Email"
                        required
                        autofocus
                    >
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-envelope"></span>
                        </div>
                    </div>
                </div>

                <!-- PASSWORD -->
                <div class="input-group mb-3">
                    <input
                        type="password"
                        name="password"
                        id="password"
                        class="form-control"
                        placeholder="Contraseña"
                        required
                    >
                    <div class="input-group-append">
                        <div class="input-group-text"
                             style="cursor:pointer"
                             onclick="togglePassword()">
                            <span id="eyeIcon" class="fas fa-eye"></span>
                        </div>
                    </div>
                </div>

                <!-- ACTIONS -->
                <div class="row">

                    <!-- remember futuro -->
                    <div class="col-6 d-flex align-items-center">
                        <small class="text-muted">
                            Acceso seguro
                        </small>
                    </div>

                    <div class="col-6">
                        <button
                            type="submit"
                            class="btn btn-primary btn-block"
                        >
                            <i class="fas fa-sign-in-alt"></i> Entrar
                        </button>
                    </div>

                </div>

            </form>

            <hr>

            <a href="/auth/saml/mock" class="btn btn-danger btn-block mb-2">
                <i class="fas fa-university"></i>
                Acceder con Universidad de Alcalá
            </a>

            <small class="text-muted d-block text-center">
                Inicio de sesión con credenciales institucionales
            </small>

            <!-- FOOTER -->
            <div class="login-footer">
                Aula de Robótica · Plataforma educativa
            </div>

        </div>

    </div>

</div>

<!-- JS -->
<script src="/static/adminlte/plugins/jquery/jquery.min.js"></script>
<script src="/static/adminlte/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/static/adminlte/js/adminlte.min.js"></script>

<script>
function togglePassword() {
    const input = document.getElementById("password");
    const icon = document.getElementById("eyeIcon");

    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>

</body>
</html>
