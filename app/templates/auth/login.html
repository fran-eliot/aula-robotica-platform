<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Login | Aula Robótica</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="/static/adminlte/css/adminlte.min.css">
<link rel="stylesheet" href="/static/adminlte/plugins/fontawesome-free/css/all.min.css">

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="/static/icons/favicon.ico">

<link rel="stylesheet" href="/static/css/login.css">
</head>

<body class="hold-transition login-page">

<div class="login-box">

    <div class="card login-card">

        <!-- HEADER -->
        <div class="login-brand">
            <img src="/static/img/alcabot-logo.png" alt="Robot">
            <h1>Aula Robótica</h1>
            <p>Acceso seguro a la plataforma</p>
        </div>

        <div class="card-body login-card-body">

            {% if error %}
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-circle mr-1"></i>
                {{ error }}
            </div>
            {% endif %}

            <!-- LOGIN FORM -->
            <form action="/login" method="post">

                <div class="input-group mb-3">
                    <input type="email"
                           name="email"
                           class="form-control"
                           placeholder="Correo electrónico"
                           required autofocus>

                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-envelope"></span>
                        </div>
                    </div>
                </div>

                <div class="input-group mb-4">
                    <input type="password"
                           name="password"
                           id="password"
                           class="form-control"
                           placeholder="Contraseña"
                           required>

                    <div class="input-group-append">
                        <div class="input-group-text login-eye"
                             onclick="togglePassword()">
                            <span id="eyeIcon" class="fas fa-eye"></span>
                        </div>
                    </div>
                </div>

                <button type="submit"
                        class="btn btn-primary btn-block btn-login mb-3">
                    <i class="fas fa-sign-in-alt mr-1"></i>
                    Entrar
                </button>

            </form>

            <!-- SAML -->
            <a href="/auth/saml/mock"
               class="btn btn-danger btn-block btn-saml">
                <i class="fas fa-university mr-1"></i>
                Universidad de Alcalá
            </a>

            <div class="login-footer">
                Aula de Robótica · EPS-UAH
            </div>

        </div>

    </div>

</div>

<script src="/static/adminlte/plugins/jquery/jquery.min.js"></script>
<script src="/static/adminlte/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>

<script>
function togglePassword() {
    const input = document.getElementById("password");
    const icon = document.getElementById("eyeIcon");

    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}
</script>

</body>
</html>
