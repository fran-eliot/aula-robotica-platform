{% extends "base.html" %}

{% block title %}
Crear usuario
{% endblock %}

{% block page_title %}
Crear nuevo usuario
{% endblock %}

{% block content %}

<div class="card">

    <div class="card-header">
        <h3 class="card-title">Nuevo usuario</h3>
    </div>

    <form method="post">

        <div class="card-body">

            <div class="form-group">

                <label>Nombre</label>

                <input 
                    type="text"
                    name="nombre"
                    class="form-control"
                    placeholder="Nombre del usuario"
                    required
                >

            </div>

        </div>

        <div class="card-footer">

            <button type="submit" class="btn btn-primary">
                Crear usuario
            </button>

            <a href="/users" class="btn btn-secondary">
                Cancelar
            </a>

        </div>

    </form>

</div>

{% endblock %}
